</head>
<body>

        <div class="sticky-right">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-bg"></div>
        <div class="container">
            <h1 class="hero-title">
                <span class="gradient-text">Discover the Best</span>
                <br>AI Tools & Resources
            </h1>
        </div>
        <div class="container">
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-number" id="totalTools">0</span>
                    <span class="stat-label">Total Tools</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="freeTools">0</span>
                    <span class="stat-label">Free</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="freemiumTools">0</span>
                    <span class="stat-label">Freemium</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="paidTools">0</span>
                    <span class="stat-label">Paid</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="openSourceTools">0</span>
                    <span class="stat-label">Open Source</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Sticky Toolbar (Search + Filters) -->
    <div class="sticky-toolbar">
        <div class="container">
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="Search AI tools...">
                <span class="search-icon">🔍</span>
            </div>
            <div class="filters-section">
                <div class="container">
                    <div class="filters">
                        <div class="filter-group">
                            <button class="filter-btn active" data-filter="all">All</button>
                            <button class="filter-btn" data-filter="free">Free</button>
                            <button class="filter-btn" data-filter="freemium">Freemium</button>
                            <button class="filter-btn" data-filter="paid">Paid</button>
                            <button class="filter-btn" data-filter="opensource">Open Source</button>
                        </div>
                        <div class="category-filter">
                            <select id="categorySelect" class="category-select">
                                <option value="all">All Categories</option>
                                <option value="text">Text & Writing</option>
                                <option value="image">Image & Art</option>
                                <option value="video">Video & Animation</option>
                                <option value="audio">Audio & Music</option>
                                <option value="code">Code & Development</option>
                                <option value="productivity">Productivity</option>
                                <option value="marketing">Marketing & SEO</option>
                                <option value="analytics">Analytics & Data</option>
                                <option value="automation">Automation & Agents</option>
                                <option value="research">Research & Learning</option>
                                <option value="design">Design & UI/UX</option>
                                <option value="support">Customer Support</option>
                                <option value="ecommerce">E-commerce</option>
                            </select>
                        </div>
                    </div>
                    <p class="results-count" id="resultsCount">Showing <span id="showingCount">0</span> of <span id="totalCount">0</span> tools</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Tools Grid -->
    <main class="main-content">
        <div class="container">
            <div class="tools-grid" id="toolsGrid">
                <!-- Tools will be loaded dynamically -->
            </div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>
            <div class="no-results" id="noResults" style="display: none;">
                <div class="no-results-icon">🔍</div>
                <h3>No tools found</h3>
                <p>Try adjusting your search or filters</p>
            </div>
            <!-- Pagination -->
            <div class="pagination" id="pagination">
                <button class="page-btn" id="prevBtn" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    Previous
                </button>
                <div class="page-numbers" id="pageNumbers"></div>
                <button class="page-btn" id="nextBtn">
                    Next
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="faq.html" class="footer-link">FAQ</a>
                    <a href="terms.html" class="footer-link">Terms of Use</a>
                    <a href="privacy.html" class="footer-link">Privacy Policy</a>
                </div>
                <div class="footer-copyright">
                    <p>&copy; 2026 AI Hub. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Back to Top Button -->
    <button id="backToTop" aria-label="Back to top" style="display:none;position:fixed;bottom:20px;right:20px;width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg, #00d4ff, #7c3aed);color:white;cursor:pointer;z-index:9999;align-items:center;justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <script>
        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            loadTools();
            initializeFilters();
            updateStats();
            initTheme();
        });

        // Theme toggle
        function initTheme() {
            const themeToggle = document.getElementById('themeToggle');
            const savedTheme = localStorage.getItem('theme') || 'dark';
            
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
            
            themeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeIcon(newTheme);
            });
        }

        function updateThemeIcon(theme) {
            const themeToggle = document.getElementById('themeToggle');
            const sunIcon = themeToggle.querySelector('.sun-icon');
            const moonIcon = themeToggle.querySelector('.moon-icon');
            if (theme === 'dark') {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            } else {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            }
        }

        // Pagination state
        const ITEMS_PER_PAGE = 30;
        let currentPage = 1;
        let currentFilter = 'all';
        let currentCategory = 'all';
        let currentSearch = '';
        let filteredTools = [];

        function loadTools(filter = 'all', category = 'all', search = '') {
            const grid = document.getElementById('toolsGrid');
            const loading = document.getElementById('loading');
            const noResults = document.getElementById('noResults');
            const showingCount = document.getElementById('showingCount');
            const totalCount = document.getElementById('totalCount');
            const pagination = document.getElementById('pagination');

            loading.style.display = 'block';
            grid.innerHTML = '';

            setTimeout(() => {
                filteredTools = aiTools;

                if (filter !== 'all') {
                    filteredTools = filteredTools.filter(tool => tool.pricing === filter);
                }

                if (category !== 'all') {
                    filteredTools = filteredTools.filter(tool => tool.category === category);
                }

                if (search) {
                    const searchLower = search.toLowerCase();
                    filteredTools = filteredTools.filter(tool =>
                        tool.name.toLowerCase().includes(searchLower) ||
                        tool.description.toLowerCase().includes(searchLower) ||
                        tool.tags.some(tag => tag.toLowerCase().includes(searchLower))
                    );
                }

                // Update current filter/category/search state
                currentFilter = filter;
                currentCategory = category;
                currentSearch = search;
                currentPage = 1;

                loading.style.display = 'none';
                totalCount.textContent = aiTools.length;
                showingCount.textContent = filteredTools.length;

                if (filteredTools.length === 0) {
                    noResults.style.display = 'block';
                    pagination.style.display = 'none';
                    return;
                }

                noResults.style.display = 'none';
                pagination.style.display = 'flex';

                // Calculate pagination
                const totalPages = Math.ceil(filteredTools.length / ITEMS_PER_PAGE);
                const startIndex = 0;
                const endIndex = ITEMS_PER_PAGE;

                // Show only current page items
                const pageTools = filteredTools.slice(startIndex, endIndex);

                pageTools.forEach((tool, index) => {
                    const card = createToolCard(tool, index);
                    grid.appendChild(card);
                });

                // Update pagination
                updatePagination(totalPages);
            }, 100);
        }

        function updatePagination(totalPages) {
            const pageNumbers = document.getElementById('pageNumbers');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;

            pageNumbers.innerHTML = '';

            // Show page numbers
            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);

            if (endPage - startPage < maxVisiblePages - 1) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }

            // Add first page if not in range
            if (startPage > 1) {
                const firstPage = document.createElement('button');
                firstPage.className = 'page-number';
                firstPage.textContent = '1';
                firstPage.addEventListener('click', () => goToPage(1));
                pageNumbers.appendChild(firstPage);

                if (startPage > 2) {
                    const dots = document.createElement('span');
                    dots.className = 'page-dots';
                    dots.textContent = '...';
                    pageNumbers.appendChild(dots);
                }
            }

            // Add page numbers in range
            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-number ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.addEventListener('click', () => goToPage(i));
                pageNumbers.appendChild(pageBtn);
            }

            // Add last page if not in range
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    const dots = document.createElement('span');
                    dots.className = 'page-dots';
                    dots.textContent = '...';
                    pageNumbers.appendChild(dots);
                }

                const lastPage = document.createElement('button');
                lastPage.className = 'page-number';
                lastPage.textContent = totalPages;
                lastPage.addEventListener('click', () => goToPage(totalPages));
                pageNumbers.appendChild(lastPage);
            }
        }

        function goToPage(page) {
            const grid = document.getElementById('toolsGrid');
            const totalPages = Math.ceil(filteredTools.length / ITEMS_PER_PAGE);

            if (page < 1 || page > totalPages) return;

            currentPage = page;

            // Calculate slice indices
            const startIndex = (page - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;

            // Clear and repopulate grid
            grid.innerHTML = '';
            const pageTools = filteredTools.slice(startIndex, endIndex);

            pageTools.forEach((tool, index) => {
                const card = createToolCard(tool, index);
                grid.appendChild(card);
            });

            // Update pagination UI
            updatePagination(totalPages);

            // Scroll to top of tools section
            document.querySelector('.main-content').scrollIntoView({ behavior: 'smooth' });
        }

        // Event listeners for pagination buttons
        document.getElementById('prevBtn').addEventListener('click', () => {
            goToPage(currentPage - 1);
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            goToPage(currentPage + 1);
        });

        function createToolCard(tool, index) {
            const card = document.createElement('article');
            card.className = 'tool-card';
            card.style.animationDelay = `${index * 30}ms`;

            const pricingMap = {
                'free': { class: 'tag-free', text: 'Free' },
                'paid': { class: 'tag-paid', text: 'Paid' },
                'freemium': { class: 'tag-freemium', text: 'Freemium' },
                'opensource': { class: 'tag-opensource', text: 'Open Source' }
            };
            const pricing = pricingMap[tool.pricing] || pricingMap['free'];

            card.innerHTML = `
                <a href="detail.html?id=${tool.id}" class="tool-card-link" title="${tool.name}">
                    <div class="tool-icon-wrapper">
                        <span class="tool-icon-emoji">${tool.icon}</span>
                    </div>
                    <div class="tool-content">
                        <div class="tool-header">
                            <h3 class="tool-name">${tool.name}</h3>
                            <span class="tool-tag ${pricing.class}">${pricing.text}</span>
                        </div>
                        <p class="tool-description">${tool.description}</p>
                        <div class="tool-tags">
                            ${tool.tags.slice(0, 3).map(tag => `<span class="tool-tag-item">${tag}</span>`).join('')}
                        </div>
                    </div>
                </a>
            `;

            return card;
        }

        function initializeFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn');
            const categorySelect = document.getElementById('categorySelect');
            const searchInput = document.getElementById('searchInput');

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadTools(btn.dataset.filter, categorySelect.value, searchInput.value);
                });
            });

            categorySelect.addEventListener('change', () => {
                const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
                loadTools(activeFilter, categorySelect.value, searchInput.value);
            });

            searchInput.addEventListener('input', () => {
                const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
                loadTools(activeFilter, categorySelect.value, searchInput.value);
            });
        }

        function updateStats() {
            const total = aiTools.length;
            const free = aiTools.filter(t => t.pricing === 'free').length;
            const freemium = aiTools.filter(t => t.pricing === 'freemium').length;
            const paid = aiTools.filter(t => t.pricing === 'paid').length;
            const opensource = aiTools.filter(t => t.pricing === 'opensource').length;

            document.getElementById('totalTools').textContent = total;
            document.getElementById('freeTools').textContent = free;
            document.getElementById('freemiumTools').textContent = freemium;
            document.getElementById('paidTools').textContent = paid;
            document.getElementById('openSourceTools').textContent = opensource;
        }

        // Mobile menu toggle
        document.querySelector('.mobile-menu-btn').addEventListener('click', function() {
            this.classList.toggle('active');
            document.querySelector('.nav').classList.toggle('active');
        });

        // Back to Top button
        const backToTopBtn = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTopBtn.style.display = 'flex';
            } else {
                backToTopBtn.style.display = 'none';
            }
        });
        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
